services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pixii
      POSTGRES_PASSWORD: pixii
      POSTGRES_DB: amazon_analytics
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixii -d amazon_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
